---
# These system settings assume a gnome desktop environment

- name: Check if Brave browser is installed
  ansible.builtin.stat:
    path: /usr/share/applications/brave-browser.desktop
  register: brave_desktop

- name: Set default web browser to Brave
  ansible.builtin.command:
    cmd: xdg-settings set default-web-browser brave-browser.desktop
  when: brave_desktop.stat.exists
  changed_when: true

- name: Warn if Brave is not installed
  ansible.builtin.debug:
    msg: "brave-browser.desktop not found, skipping default browser configuration"
  when: not brave_desktop.stat.exists

- name: Set keyboard configuration variables
  ansible.builtin.set_fact:
    keyboard_repeat_interval: 8
    keyboard_repeat_delay: 180

- name: Set Caps Lock as additional Escape key
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.input-sources xkb-options "['caps:escape']"
  changed_when: true

- name: Set keyboard repeat interval (lower is faster)
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.peripherals.keyboard repeat-interval {{ keyboard_repeat_interval }}
  changed_when: true

- name: Set keyboard repeat delay
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.peripherals.keyboard delay {{ keyboard_repeat_delay }}
  changed_when: true
